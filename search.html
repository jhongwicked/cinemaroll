    <style>
        :root {
            --primary: #db2b39;
            --secondary: #29335c;
            --accent: #f3a712;
            --bg-dark: #0f1014;
            --card-bg: #1a1d24;
            --text-light: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Saira', sans-serif;
            background: var(--bg-dark);
            color: white;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Security: Disable text selection */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Allow selection in search input */
        input {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        /* TUNUGMA SA HEADER NG INDEX.HTML */
        header {
            background: rgba(15, 16, 20, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(243, 167, 18, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .back-home {
            color: white;
            text-decoration: none;
            font-size: 14px;
            background: var(--primary);
            padding: 8px 18px;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: 600;
            text-transform: uppercase;
        }

        .back-home:hover {
            background: var(--accent);
            color: var(--secondary);
        }

        .container {
            padding: 40px 5%;
            flex: 1;
            margin-top: 80px;
            /* Space for the fixed header */
        }

        .search-query-text {
            margin-bottom: 30px;
            font-size: 1.5rem;
            color: var(--accent);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-info {
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        /* FAVORITE HEART ON CARD */
        .card-fav-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: 0.3s;
        }

        .card-fav-icon.active {
            color: var(--primary);
        }

        /* UPDATED FOOTER STYLE */
        .site-footer {
            background: #0a0b0d;
            color: #888;
            padding: 60px 5% 30px;
            border-top: 1px solid #1a1c1f;
            margin-top: 50px;
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
        }

        .footer-logo span {
            color: var(--primary);
        }

        .follow-us {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .follow-us span {
            font-weight: 700;
            color: #555;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icons a {
            color: #fff;
            font-size: 20px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
        }

        .footer-col h4 {
            color: #555;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .footer-col p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 5px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 10px;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
            cursor: pointer;
        }

        .footer-links a:hover {
            color: #fff;
            padding-left: 5px;
        }

        .footer-bottom {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #15171a;
            font-size: 12px;
            color: #444;
            text-align: left;
        }

        /* MODAL */
        #player-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .video-box {
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: #000;
            border: 2px solid var(--accent);
            border-radius: 10px;
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: var(--primary);
        }

        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 768px) {
            header {
                padding: 10px 5%;
            }

            .logo {
                font-size: 20px;
            }

            .back-home {
                font-size: 12px;
                padding: 5px 10px;
            }

            .container {
                margin-top: 60px;
            }

            .search-query-text {
                font-size: 1.2rem;
            }

            /* DALAWANG COLUMNS SA MOBILE SCREEN */
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .card-info {
                font-size: 12px;
            }

            .footer-top {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

<body>

    <header>
        <a href="/" class="logo">CINEMA<span>ROLL</span></a>
        <a href="/" class="back-home"><i class="fas fa-home"></i> HOME</a>
    </header>

    <div class="container">
        <h2 class="search-query-text" id="queryDisplay">Searching...</h2>
        <div class="results-grid" id="resultsGrid"></div>
    </div>

    <div id="footer-placeholder"></div>

    <div id="player-modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <div class="video-box"><iframe id="videoIframe" src="" allowfullscreen
                style="width:100%; height:100%; border:none;"></iframe></div>
    </div>

    <script>
        const API_KEY = '13a2e3c3497a4d8b8f9a1d449a02a373';
        const POSTER_URL = 'https://image.tmdb.org/t/p/w500';

        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        const country = params.get('country'); // Kuhanin ang country code

        // Check kung country ba o search term
        if (query) {
            document.getElementById('queryDisplay').innerText = `Results for: "${query}"`;
            searchMovies(query);
        } else if (country) {
            document.getElementById('queryDisplay').innerText = `Movies from Region: ${country}`;
            fetchByCountryCode(country);
        }

        async function searchMovies(q) {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);
            const data = await res.json();
            displayResults(data.results);
        }

        async function fetchByCountryCode(iso) {
            const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=${iso}`);
            const data = await res.json();
            displayResults(data.results);
        }

        // Favorites Logic
        function toggleFavorite(event, m, type) {
            event.stopPropagation();
            let favs = JSON.parse(localStorage.getItem('cr_favorites') || '[]');
            const index = favs.findIndex(f => f.id === m.id);

            if (index === -1) {
                m.media_type = type;
                favs.push(m);
            } else {
                favs.splice(index, 1);
            }
            localStorage.setItem('cr_favorites', JSON.stringify(favs));
            event.currentTarget.classList.toggle('active');
        }

        function isFavorite(id) {
            let favs = JSON.parse(localStorage.getItem('cr_favorites') || '[]');
            return favs.some(f => f.id === id);
        }

        function displayResults(results) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = "";

            if (!results || results.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; margin-top: 50px;'>No results found. Try searching for something else.</p>";
                return;
            }

            results.forEach(m => {
                if (!m.poster_path) return;
                const type = m.media_type || (m.title ? 'movie' : 'tv');
                const title = m.title || m.name;
                const isFav = isFavorite(m.id);
                const mData = JSON.stringify(m).replace(/"/g, '&quot;');

                grid.innerHTML += `
                    <div class="card" onclick="openPlayer(${m.id}, '${type}')">
                        <div class="card-fav-icon ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, ${mData}, '${type}')">
                            <i class="fas fa-heart"></i>
                        </div>
                        <img src="${POSTER_URL + m.poster_path}" alt="${title}" loading="lazy">
                        <div class="card-info"><strong>${title}</strong></div>
                    </div>`;
            });
        }

        function slugifyTitle(text, id) {
            let slug = text.toString().toLowerCase()
                .replace(/[^a-z0-9]+/g, '-') // palitan ang special chars ng hyphen
                .replace(/^-+|-+$/g, '');    // tanggalin ang hyphens sa dulo

            slug = slug.substring(0, 50).replace(/-+$/, ''); // limit sa 50 chars
            if (!slug) slug = 'movie';

            return `${slug}-${id}.html`;
        }

        // Bagong goToPlay function na naka-redirect sa static files
        function goToPlay(id, type, title) {
            if (type === 'movie') {
                const fileName = slugifyTitle(title, id);
                // Ire-redirect sa static PBN page na nasa 'watch' folder
                window.location.href = `watch/${fileName}`;
            } else {
                // Fallback para sa TV Shows (kung hindi sila kasama sa generator mo)
                window.location.href = `play.html?id=${id}&type=${type}`;
            }
        }

        function closePlayer() {
            document.getElementById('videoIframe').src = '';
            document.getElementById('player-modal').style.display = 'none';
        }

        // Disable Right-Click
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        }, false);

        // Disable keyboard shortcuts
        document.onkeydown = function (e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
        };
        // 1. Logic para i-load ang Footer file
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
                setupPWAInstall(); // I-setup ang install button pagkatapos ma-load ang footer
            });

        // 2. Progressive Web App Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // 3. PWA Install Logic
        let deferredPrompt;
        function setupPWAInstall() {
            const installBtn = document.getElementById('installBtn');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (installBtn) installBtn.style.display = 'block';
            });

            if (installBtn) {
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') installBtn.style.display = 'none';
                        deferredPrompt = null;
                    }
                });
            }
        }

        // ... Ituloy ang init() at iba pang existing functions mo ...
    </script>
</body>

</html>
