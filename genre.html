<body>

    <header>
        <a href="index" class="logo">CINEMA<span>ROLL</span></a>
        <a href="index" class="back-btn"><i class="fas fa-home"></i> HOME</a>
    </header>

    <div class="container">
        <h1 id="genreTitle" class="genre-title">Genre</h1>
        <div class="movie-grid" id="genreGrid"></div>
    </div>

    <div id="player-modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <div class="video-box">
            <iframe id="videoIframe" src="" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const API_KEY = '13a2e3c3497a4d8b8f9a1d449a02a373';
        const POSTER_URL = 'https://image.tmdb.org/t/p/w500';

        const collectionSchema = {
            "@context": "https://schema.org",
            "@type": "CollectionPage",
            "name": "Movie Genre Collection - CINEMAROLL",
            "description": "Browse our collection of movies by genre."
        };
        const scriptSchema = document.createElement('script');
        scriptSchema.type = "application/ld+json";
        scriptSchema.text = JSON.stringify(collectionSchema);
        document.head.appendChild(scriptSchema);

        const urlParams = new URLSearchParams(window.location.search);
        const genreId = urlParams.get('id');
        const genreName = urlParams.get('name');

        document.getElementById('genreTitle').innerText = genreName || 'Movies';

        async function fetchGenreMovies() {
            const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}`);
            const data = await res.json();
            const grid = document.getElementById('genreGrid');

            data.results.forEach(m => {
                if (!m.poster_path) return;
                const movieTitle = m.title;
                grid.innerHTML += `
            <div class="card" onclick="goToPlay('${m.id}', 'movie')">
                <img src="${POSTER_URL + m.poster_path}" alt="${movieTitle} Poster - CINEMAROLL" loading="lazy">
                <div class="card-info"><strong>${movieTitle}</strong></div>
            </div>`;
            });
        }

        function slugifyTitle(text, id) {
            let slug = text.toString().toLowerCase()
                .replace(/[^a-z0-9]+/g, '-') // palitan ang special chars ng hyphen
                .replace(/^-+|-+$/g, '');    // tanggalin ang hyphens sa dulo

            slug = slug.substring(0, 50).replace(/-+$/, ''); // limit sa 50 chars
            if (!slug) slug = 'movie';

            return `${slug}-${id}.html`;
        }

        // Bagong goToPlay function na naka-redirect sa static files
        function goToPlay(id, type, title) {
            if (type === 'movie') {
                const fileName = slugifyTitle(title, id);
                // Ire-redirect sa static PBN page na nasa 'watch' folder
                window.location.href = `watch/${fileName}`;
            } else {
                // Fallback para sa TV Shows (kung hindi sila kasama sa generator mo)
                window.location.href = `play.html?id=${id}&type=${type}`;
            }
        }

        function closePlayer() {
            document.getElementById('videoIframe').src = '';
            document.getElementById('player-modal').style.display = 'none';
        }

        if (genreId) fetchGenreMovies();

        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        }, false);

        document.onkeydown = function (e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
        };
        // 1. Logic para i-load ang Footer file
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
                setupPWAInstall(); // I-setup ang install button pagkatapos ma-load ang footer
            });

        // 2. Progressive Web App Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // 3. PWA Install Logic
        let deferredPrompt;
        function setupPWAInstall() {
            const installBtn = document.getElementById('installBtn');

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (installBtn) installBtn.style.display = 'block';
            });

            if (installBtn) {
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') installBtn.style.display = 'none';
                        deferredPrompt = null;
                    }
                });
            }
        }

        // ... Ituloy ang init() at iba pang existing functions mo ...
    </script>
